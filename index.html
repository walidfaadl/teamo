/* ══ AUTH ══ */

onAuthStateChanged(auth, async (user) => {

  if (user) {

    currentUser = user;

    const snap = await getDoc(doc(db, "users", user.uid));

    if (!snap.exists()) { await signOut(auth); return; }

    const data = snap.data();

    currentRole = data.role;

    if (currentRole === "admin") {

      showScreen("screen-admin");

      startAdminListeners();

      document.getElementById("adminUserName").textContent = data.name || "المدير";

      document.getElementById("adminAvatar").textContent = (data.name||"م")[0];

    } else {

      showScreen("screen-member");

      startMemberListeners();

      document.getElementById("memberName").textContent = data.name || "عضو";

      document.getElementById("memberAvatar").textContent = (data.name||"أ")[0];

    }

  } else {

    currentUser=null; currentRole=null;

    unsubListeners.forEach(u=>u()); unsubListeners=[];

    showScreen("screen-login");

  }

});

/* ══ ADMIN LISTENERS ══ */

function startAdminListeners() {

  const u=onSnapshot(query(collection(db,"tasks"),orderBy("createdAt","desc")),snap=>{

    const tasks=snap.docs.map(d=>({id:d.id,...d.data()}));

    renderAdminTasks(tasks);

    document.getElementById("statTotal").textContent=tasks.length;

    document.getElementById("statPending").textContent=tasks.filter(t=>t.status==="pending").length;

    document.getElementById("statDone").textContent=tasks.filter(t=>t.status==="completed").length;

  });

  unsubListeners.push(u);

  const u2=onSnapshot(query(collection(db,"taskAssignments"),orderBy("notifSentAt","desc")),snap=>{

    renderTracking(snap.docs.map(d=>({id:d.id,...d.data()})));

  });

  unsubListeners.push(u2);

  loadMembers();

}


async function loadMembers() {

  const snap=await getDocs(query(collection(db,"users"),orderBy("createdAt","desc")));

  const all=snap.docs.map(d=>({id:d.id,...d.data()}));

  window._members=all.filter(m=>m.role==="member");

  document.getElementById("statMembers").textContent=window._members.length;

  renderRecipients(window._members);

  renderMembersTable(all);

}


/* ══ MEMBER MANAGEMENT ══ */

window.createMember = async function() {

  const name=document.getElementById("mName").value.trim();

  const email=document.getElementById("mEmail").value.trim();

  const password=document.getElementById("mPassword").value;

  const role=document.getElementById("mRole").value;

  if(!name||!email||!password){showToast("⚠️ أدخل جميع البيانات","warning");return;}

  if(password.length<6){showToast("⚠️ كلمة المرور 6 أحرف على الأقل","warning");return;}

  const btn=document.getElementById("btnCreateMember");

  btn.disabled=true; btn.textContent="⏳ جاري...";

  try {

    const res=await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=${WEB_API_KEY}`,{

      method:"POST",headers:{"Content-Type":"application/json"},

      body:JSON.stringify({email,password,returnSecureToken:true})

    });

    const data=await res.json();

    if(data.error){

      showToast("❌ "+(data.error.message==="EMAIL_EXISTS"?"البريد مستخدم بالفعل":data.error.message),"error");

      btn.disabled=false; btn.textContent="إضافة"; return;

    }

    await setDoc(doc(db,"users",data.localId),{

      name,email,role,isActive:true,fcmToken:"pending",

      createdAt:serverTimestamp(),createdBy:currentUser.uid

    });

    showToast(`✅ تم إضافة ${name}`,"success");

    closeMemberModal(); loadMembers();

  } catch(e){showToast("❌ "+e.message,"error");}

  btn.disabled=false; btn.textContent="إضافة";

};


function renderMembersTable(members) {

  const list=document.getElementById("membersList");

  if(!members.length){list.innerHTML=`<div class="empty-card">👥<br>لا يوجد أعضاء بعد</div>`;return;}

  list.innerHTML=members.map(m=>`

    <div class="member-item">

      <div class="member-item-avatar">${(m.name||"م")[0]}</div>

      <div class="member-item-info">

        <div class="member-item-name">${m.name||"—"}</div>

        <div class="member-item-email">${m.email||"—"}</div>

      </div>

      <div class="member-item-badges">

        <span class="chip ${m.role==="admin"?"chip-purple":"chip-blue"}">${m.role==="admin"?"مدير":"عضو"}</span>

        <span class="chip ${m.isActive?"chip-green":"chip-gray"}">${m.isActive?"نشط":"معطّل"}</span>

      </div>

      <div class="member-item-actions">

        <button class="icon-btn" onclick="editMember('${m.id}','${m.name}','${m.email}','${m.role}')">✏️</button>

        <button class="icon-btn ${m.isActive?"warn":"ok"}" onclick="toggleMember('${m.id}',${m.isActive})">${m.isActive?"🔒":"✅"}</button>

        ${m.role!=="admin"?`<button class="icon-btn danger" onclick="deleteMember('${m.id}','${m.name}')">🗑️</button>`:""}

      </div>

    </div>`).join("");

}


window.toggleMember=async function(uid,cur){

  try{await updateDoc(doc(db,"users",uid),{isActive:!cur});showToast(cur?"🔒 تم التعطيل":"✅ تم التفعيل","success");loadMembers();}

  catch(e){showToast("❌ "+e.message,"error");}

};

window.deleteMember=async function(uid,name){

  if(!confirm(`حذف ${name}؟`))return;

  try{await deleteDoc(doc(db,"users",uid));showToast(`🗑️ تم الحذف`,"success");loadMembers();}

  catch(e){showToast("❌ "+e.message,"error");}

};

  document.getElementById("mRole").value=role;

  document.getElementById("btnCreateMember").textContent="حفظ";

  document.getElementById("btnCreateMember").onclick=()=>updateMember(uid);

window.updateMember=async function(uid){

  const name=document.getElementById("mName").value.trim();

window.openMemberModal=()=>document.getElementById("memberModal").classList.add("visible");

window.openNewMemberModal=function(){

  document.getElementById("mName").value="";

  document.getElementById("mPassword").value="";

window.closeMemberModal=()=>document.getElementById("memberModal").classList.remove("visible");


/* ══ SEND TASK ══ */

window.sendTask=async function(){

  const title=document.getElementById("fTitle").value.trim();

  const content=document.getElementById("fContent").value.trim();

  const category=document.getElementById("fCategory").value;

  const notifType=document.getElementById("fNotifType").value;

  const deadline=document.getElementById("fDeadline").value;

  const priority=window._selectedPriority||"عاجل";

  const recipients=[...(window._selectedRecipients||[])];

  if(!title||!content){showToast("⚠️ أدخل العنوان والنص","warning");return;}

  if(!recipients.length){showToast("⚠️ اختر مستلماً","warning");return;}

  const btn=document.getElementById("btnSend");

  btn.disabled=true; btn.textContent="⏳ جاري...";

  try{

    const taskRef=await addDoc(collection(db,"tasks"),{

      title,content,category,priority,notifType,recipients,

      targetDeadline:deadline?new Date(deadline):null,

      createdBy:currentUser.uid,createdAt:serverTimestamp(),status:"pending"

    });

    for(const uid of recipients){

      await addDoc(collection(db,"taskAssignments"),{

        taskId:taskRef.id,userId:uid,notifSentAt:serverTimestamp(),

        notifDeliveredAt:null,openedAt:null,acknowledgedAt:null,

        status:"pending",statusUpdatedAt:serverTimestamp()

      });

    }

    showToast(notifType==="critical"?`🚨 تم الإرسال الحرج`:`✅ تم الإرسال إلى ${recipients.length} أعضاء`,"success");

    document.getElementById("fTitle").value="";

    document.getElementById("fContent").value="";

    window.selectNone();

    showAdminTab("overview");

  }catch(e){showToast("❌ "+e.message,"error");}

  btn.disabled=false; btn.textContent="إرسال";

};


/* ══ MEMBER PORTAL ══ */

function startMemberListeners(){

  const u=onSnapshot(query(collection(db,"taskAssignments"),where("userId","==",currentUser.uid)),async snap=>{

    const assignments=snap.docs.map(d=>({id:d.id,...d.data()}));

    await renderMemberTasks(assignments,"all");

    const unread=assignments.filter(a=>!a.openedAt).length;

    const badge=document.getElementById("memberBadge");

    badge.textContent=unread; badge.style.display=unread>0?"flex":"none";

    for(const a of assignments.filter(x=>!x.acknowledgedAt)){

      const ts=await getDoc(doc(db,"tasks",a.taskId));

      if(ts.exists()&&ts.data().notifType==="critical"){showCriticalModal(ts.data(),a.id);break;}

    }

  });

  unsubListeners.push(u);

}


window._currentFilter="all";

async function renderMemberTasks(assignments,filter){

  window._currentFilter=filter;

  const list=document.getElementById("memberTaskList");

  list.innerHTML=`<div class="loading-wrap"><div class="spinner"></div></div>`;

  const tasksData=[];

  for(const a of assignments){

    try{const ts=await getDoc(doc(db,"tasks",a.taskId));if(ts.exists())tasksData.push({a,t:{id:ts.id,...ts.data()}});}catch(e){}

  }

  let filtered=tasksData;

  if(filter==="urgent")filtered=tasksData.filter(x=>x.t.priority==="عاجل");

  else if(filter==="done")filtered=tasksData.filter(x=>x.a.status==="completed");

  if(!filtered.length){list.innerHTML=`<div class="empty-card">📭<br>لا توجد مهام هنا</div>`;return;}

  list.innerHTML=filtered.map(({a,t})=>{

    const isUnread=!a.openedAt,isCrit=t.notifType==="critical";

    const pb=t.priority==="عاجل"?"chip-red":t.priority==="مهم"?"chip-orange":"chip-blue";

    const cb=t.category==="متابعة عاجلة"?"chip-red":t.category==="حملات إعلامية"?"chip-purple":"chip-blue";

    const ts2=t.createdAt?.toDate?t.createdAt.toDate().toLocaleTimeString("ar",{hour:"2-digit",minute:"2-digit"}):"—";

    return `<div class="task-card ${isUnread?"unread":""} ${isCrit?"critical":""}" onclick="openTask('${a.id}')">

      <div class="task-card-top">

        <div class="task-chips">

          ${isCrit?'<span class="chip chip-red">🚨 حرج</span>':""}

          <span class="chip ${pb}">${t.priority}</span>

          <span class="chip ${cb}">${t.category}</span>

          ${isUnread?'<span class="chip chip-accent">جديد</span>':""}

        </div>

        <span class="task-time">${ts2}</span>

      </div>

      <div class="task-title">${t.title}</div>

      <div class="task-body">${(t.content||"").substring(0,100)}${(t.content||"").length>100?"...":""}</div>

      <div class="task-footer">

        <select class="status-select" onclick="event.stopPropagation()" onchange="updateStatus('${a.id}',this.value)">

          <option value="pending" ${a.status==="pending"?"selected":""}>⏳ معلق</option>

          <option value="in_progress" ${a.status==="in_progress"?"selected":""}>⚡ جاري</option>

          <option value="completed" ${a.status==="completed"?"selected":""}>✅ مكتمل</option>

        </select>

      </div>

    </div>`;

  }).join("");

}


window.openTask=async function(id){

  try{await updateDoc(doc(db,"taskAssignments",id),{openedAt:serverTimestamp()});showToast("📖 تم التسجيل","success");}catch(e){}

};

window.updateStatus=async function(id,s){

  try{await updateDoc(doc(db,"taskAssignments",id),{status:s,statusUpdatedAt:serverTimestamp()});

  showToast(`📊 ${s==="pending"?"معلق":s==="in_progress"?"جاري":"مكتمل"}`,"success");}catch(e){}

};

window.filterMemberTasks=function(filter,el){

  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));

  el.classList.add("active");

  getDocs(query(collection(db,"taskAssignments"),where("userId","==",currentUser.uid))).then(async s=>{

    await renderMemberTasks(s.docs.map(d=>({id:d.id,...d.data()})),filter);

  });

};


/* ══ CRITICAL MODAL ══ */

function showCriticalModal(task,assignmentId){

  document.getElementById("modalTaskTitle").textContent=task.title||"";

  document.getElementById("modalTaskText").textContent=task.content||"";

  document.getElementById("criticalModal").classList.add("visible");

  document.getElementById("criticalModal").dataset.assignmentId=assignmentId||"";

  try{const ctx=new(window.AudioContext||window.webkitAudioContext)();[0,250,500].forEach(d=>setTimeout(()=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.setValueAtTime(880,ctx.currentTime);o.frequency.exponentialRampToValueAtTime(440,ctx.currentTime+0.2);g.gain.setValueAtTime(0.3,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);o.start();o.stop(ctx.currentTime+0.3);},d));}catch(e){}

}
